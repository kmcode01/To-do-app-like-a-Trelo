<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow | 404 Not Found</title>
    <style>
      :root {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #122024;
        background: #f6fbff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      .card {
        width: min(620px, 100%);
        background: #ffffff;
        border: 1px solid #d7e7f0;
        border-radius: 1rem;
        padding: 1.5rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.7rem, 2.5vw, 2.2rem);
      }

      p {
        margin: 0.8rem 0 0;
        color: #35505a;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        text-decoration: none;
        color: #1f7ae0;
        border: 1px solid #1f7ae0;
        border-radius: 0.5rem;
        padding: 0.6rem 1rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-label="404">
        <h1>404 Not Found</h1>
        <p>The page you requested does not exist.</p>
        <a href="/">Go to Home</a>
      </section>
    </main>
  </body>
</html>
